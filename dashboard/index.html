<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard de Aprendizado de Alemão</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 20px; background:#f9f9f9;}
    h1 {color:#2c3e50;}
    .phase {margin-bottom:30px;}
    .phase h2 {color:#34495e;}
    .progress {background:#e0e0e0; border-radius:5px; overflow:hidden; height:24px; width:100%;}
    .progress div {height:100%; background:#27ae60; width:0%; transition:width .4s;}
    .details {margin-top:10px;}
    .details ul {list-style:none; padding:0;}
    .details li {margin:4px 0;}
  </style>
</head>
<body>
  <h1>📊 Dashboard de Aprendizado de Alemão</h1>
  <div id="dashboard"></div>

  <script>
    // Estrutura básica das fases (mesmo que no plano)
    const phases = [
      {id:"phase1", name:"Iniciante (0‑3 meses)", weeks:12},
      {id:"phase2", name:"Intermediário (3‑9 meses)", weeks:24},
      {id:"phase3", name:"Avançado (9‑18 meses)", weeks:36}
    ];

    // Carrega progresso (arquivo JSON) ou cria padrão
    fetch('progress.json')
      .then(r=>r.ok? r.json() : Promise.resolve({}))
      .then(data=>{
        const container = document.getElementById('dashboard');
        phases.forEach(p=>{
          const prog = data[p.id] ?? {completedWeeks:0, completedDays:0};
          const percent = Math.round((prog.completedWeeks / p.weeks) * 100);
          const el = document.createElement('div');
          el.className='phase';
          el.innerHTML = `
            <h2>${p.name}</h2>
            <div class="progress"><div style="width:${percent}%"></div></div>
            <div class="details">
              <ul>
                <li>Semanas concluídas: ${prog.completedWeeks} / ${p.weeks}</li>
                <li>Dias de prática: ${prog.completedDays}</li>
                <li>Progresso: ${percent}%</li>
              </ul>
            </div>
          `;
          container.appendChild(el);
        });
      })
      .catch(err=>console.error('Erro ao carregar progresso', err));
  </script>
</body>
</html>
